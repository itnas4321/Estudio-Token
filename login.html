<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Estudio Token</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F7F4EF;
      --dark: #1A1814;
      --brown: #6B4F3A;
      --gold: #C9A96E;
      --muted: #9A8E82;
      --line: #E2DDD6;
    }
    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      padding: 20px;
    }
    .card {
      background: var(--cream);
      border-radius: 12px;
      padding: 48px 36px;
      width: 100%;
      max-width: 380px;
      animation: fadeUp .5s ease both;
    }
    .brand { text-align: center; margin-bottom: 36px; }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      color: var(--brown);
    }
    .brand-sub {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      background: #fff;
      color: var(--dark);
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--gold); }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .85; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg {
      font-size: 13px;
      color: #C0392B;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 28px;
      letter-spacing: .04em;
    }
    .footer-note span { color: var(--gold); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-name">Estudio Token</div>
      <div class="brand-sub">Panel de administración</div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tucafe@email.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') ingresar()">
    </div>

    <button class="btn-login" id="btn-login" onclick="ingresar()">Ingresar</button>
    <div class="error-msg" id="error-msg"></div>

    <div class="footer-note">
      ¿No tenés cuenta? Contactá a <span>Estudio Token</span>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://oaiutkqvrywttrkajyye.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9haXV0a3F2cnl3dHRya2FqeXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzQzMTYsImV4cCI6MjA5NTQ1MDMxNn0.DeoK-NDQMocQhWEGATB5HRilt3rttEEIXznTyKlPmCU';

    // Si ya hay sesión, ir directo al admin
    try {
      const s = JSON.parse(localStorage.getItem('et_session'));
      if (s && s.cliente_id) window.location.href = 'admin.html';
    } catch {}

    async function ingresar() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');

      if (!email || !password) { errEl.textContent = 'Completá todos los campos'; return; }

      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errEl.textContent = '';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/login_cliente`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ p_email: email, p_password: password })
        });

        const data = await res.json();

        if (!data || !data.length) {
          errEl.textContent = 'Email o contraseña incorrectos';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
          return;
        }

        const cliente = data[0];
        localStorage.setItem('et_session', JSON.stringify({
          cliente_id: cliente.id,
          slug: cliente.slug,
          email: cliente.email,
          nombre: cliente.nombre
        }));

        window.location.href = 'admin.html';

      } catch(e) {
        errEl.textContent = 'Error de conexión. Intentá de nuevo.';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }
  </script>
</body>
</html>

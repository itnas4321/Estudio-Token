<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Digital</title>
  <link id="google-font" rel="stylesheet" href="">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F7F4EF; --dark: #1A1814; --brown: #6B4F3A;
      --gold: #C9A96E; --muted: #9A8E82; --line: #E2DDD6;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--dark); font-family: var(--font-body, 'DM Sans', sans-serif); font-weight: 300; min-height: 100vh; padding-bottom: 80px; }
    .portada { width: 100%; height: 200px; object-fit: cover; display: block; }
    .hero { padding: 32px 28px 28px; text-align: center; border-bottom: 1px solid var(--line); animation: fadeDown .8s ease both; }
    .hero-logo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid var(--cream); margin: -52px auto 16px; display: block; box-shadow: 0 2px 12px rgba(0,0,0,.12); }
    .hero-logo.no-portada { margin: 0 auto 16px; }
    .hero-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .hero-badge::before, .hero-badge::after { content: ''; display: block; width: 24px; height: 1px; background: var(--gold); }
    .hero h1 { font-family: var(--font-titulo, 'Cormorant Garamond', serif); font-size: 44px; font-weight: 300; line-height: 1; margin-bottom: 6px; }
    .hero h1 em { font-style: italic; color: var(--brown); }
    .hero-sub { font-size: 13px; color: var(--muted); letter-spacing: .04em; }
    .cat-nav { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--line); padding: 0 20px; }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; background: none; border: none; padding: 14px 18px; font-family: var(--font-body, 'DM Sans', sans-serif); font-size: 12px; font-weight: 400; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .2s, border-color .2s; }
    .cat-btn.active { color: var(--dark); border-bottom-color: var(--gold); }
    .section { padding: 36px 24px 0; animation: fadeUp .6s ease both; }
    .section-title { font-family: var(--font-titulo, 'Cormorant Garamond', serif); font-size: 28px; font-weight: 300; font-style: italic; color: var(--brown); margin-bottom: 4px; }
    .section-desc { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
    .item { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--line); }
    .item:last-child { border-bottom: none; }
    .item-info { flex: 1; }
    .item-name { font-size: 15px; font-weight: 400; margin-bottom: 4px; }
    .item-detail { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .item-tag { display: inline-block; font-size: 10px; letter-spacing: .06em; text-transform: uppercase; background: var(--gold); color: #fff; padding: 2px 7px; border-radius: 2px; margin-top: 6px; }
    .item-price { font-family: var(--font-titulo, 'Cormorant Garamond', serif); font-size: 20px; font-weight: 300; color: var(--brown); white-space: nowrap; padding-top: 2px; }
    .divider { display: flex; align-items: center; gap: 12px; padding: 32px 24px 0; opacity: .4; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gold); }
    .divider span { font-size: 14px; color: var(--gold); }
    .loading { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; }
    .error-msg { text-align: center; padding: 60px 24px; color: var(--brown); font-size: 14px; }

    /* FOOTER */
    .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 50; }
    .footer-left { display: flex; align-items: center; gap: 10px; }
    .nfc-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: pulse 2s ease infinite; }
    .footer-text { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.5); }
    .footer-brand { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); }

    /* REDES LATERAL */
    .redes-wrap { position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 100; display: flex; align-items: center; }
    .redes-trigger { background: rgba(0,0,0,.25); color: #fff; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 14px 7px; cursor: pointer; border-radius: 6px 0 0 6px; user-select: none; transition: background .3s, opacity .3s; opacity: .5; backdrop-filter: blur(4px); }
    .redes-wrap:hover .redes-trigger { background: rgba(0,0,0,.55); opacity: 1; }
    .redes-wrap:hover .redes-menu { opacity: 1; pointer-events: all; transform: translate(-4px, -50%); }
    .redes-menu { position: absolute; right: 100%; top: 50%; transform: translate(8px, -50%); opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; display: flex; flex-direction: column; gap: 10px; padding-right: 10px; }
    .redes-item { display: flex; align-items: center; gap: 10px; text-decoration: none; white-space: nowrap; flex-direction: row-reverse; }
    .redes-label { background: rgba(0,0,0,.65); color: #fff; font-size: 12px; letter-spacing: .04em; padding: 7px 14px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.15); backdrop-filter: blur(4px); }
    .redes-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.2); flex-shrink: 0; overflow: hidden; background: #fff; }
    .redes-icon svg { width: 22px; height: 22px; }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(.8); } }
  </style>
</head>
<body>
  <div id="menu-content"><div class="loading">Cargando menú...</div></div>

  <!-- REDES LATERAL -->
  <div class="redes-wrap" id="redes-wrap">
    <div class="redes-trigger">Nuestras redes</div>
    <div class="redes-menu" id="redes-menu"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer" id="footer-bar">
    <div class="footer-left">
      <div class="nfc-dot"></div>
      <span class="footer-text">Token NFC activo</span>
    </div>
    <span class="footer-brand">Estudio Token</span>
  </div>

  <script>
    const SUPABASE_URL = 'https://oaiutkqvrywttrkajyye.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9haXV0a3F2cnl3dHRya2FqeXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzQzMTYsImV4cCI6MjA5NTQ1MDMxNn0.DeoK-NDQMocQhWEGATB5HRilt3rttEEIXznTyKlPmCU';
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('local') || 'cafe-origen';

    const FUENTES = {
      clasica: { titulo: "'Cormorant Garamond', serif", body: "'DM Sans', sans-serif", google: "Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400" },
      moderna: { titulo: "'DM Sans', sans-serif", body: "'DM Sans', sans-serif", google: "DM+Sans:wght@300;400" },
      bold:    { titulo: "'DM Sans', sans-serif", body: "'DM Sans', sans-serif", google: "DM+Sans:wght@400;500" },
      mono:    { titulo: "'Courier New', monospace", body: "'Courier New', monospace", google: "" }
    };

    async function fetchJSON(url) {
      const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
      return res.json();
    }

    function buildRedes(c) {
      const ICONS = {
        ig: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="ig1" cx="30%" cy="107%" r="150%"><stop offset="0%" stop-color="#fdf497"/><stop offset="5%" stop-color="#fdf497"/><stop offset="45%" stop-color="#fd5949"/><stop offset="60%" stop-color="#d6249f"/><stop offset="90%" stop-color="#285AEB"/></radialGradient></defs><rect width="24" height="24" rx="5" fill="url(#ig1)"/><path d="M12 7a5 5 0 100 10A5 5 0 0012 7zm0 8a3 3 0 110-6 3 3 0 010 6zm5.2-8.8a1.2 1.2 0 100 2.4 1.2 1.2 0 000-2.4z" fill="#fff"/></svg>`,
        wa: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" rx="5" fill="#25D366"/><path d="M12 4a8 8 0 00-6.93 11.97L4 20l4.17-1.06A8 8 0 1012 4zm0 14.5a6.46 6.46 0 01-3.29-.9l-.24-.14-2.47.63.65-2.41-.16-.25A6.5 6.5 0 1112 18.5zm3.56-4.87c-.19-.1-1.14-.56-1.31-.63-.18-.06-.3-.1-.43.1-.13.19-.5.63-.62.76-.11.13-.23.14-.42.05a5.3 5.3 0 01-1.56-.96 5.84 5.84 0 01-1.08-1.34c-.11-.2-.01-.3.09-.4l.28-.33c.1-.12.13-.2.19-.33.07-.13.03-.25-.02-.35-.05-.1-.43-1.04-.59-1.42-.15-.37-.31-.32-.43-.33h-.36c-.13 0-.33.05-.5.24-.18.19-.67.65-.67 1.59s.69 1.84.78 1.97c.1.13 1.35 2.06 3.27 2.89.46.2.81.31 1.09.4.46.14.87.12 1.2.07.37-.05 1.14-.46 1.3-.91.16-.45.16-.84.11-.91-.04-.08-.17-.13-.36-.22z" fill="#fff"/></svg>`,
        gm: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" rx="5" fill="#fff"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z" fill="#EA4335"/></svg>`,
        rv: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" rx="5" fill="#FBBC05"/><path d="M12 3l2.47 5 5.53.8-4 3.9.94 5.5L12 15.5l-4.94 2.7.94-5.5L4 8.8l5.53-.8z" fill="#fff"/></svg>`
      };
      const items = [];
      if (c.instagram)   items.push({ href: `https://instagram.com/${c.instagram.replace('@','')}`, icon: ICONS.ig, label: 'Instagram' });
      if (c.whatsapp)    items.push({ href: `https://wa.me/${c.whatsapp.replace(/\D/g,'')}`, icon: ICONS.wa, label: 'WhatsApp' });
      if (c.google_maps) items.push({ href: c.google_maps, icon: ICONS.gm, label: 'Cómo llegar' });
      if (c.resena_url)  items.push({ href: c.resena_url, icon: ICONS.rv, label: 'Dejanos una reseña' });

      const wrap = document.getElementById('redes-wrap');
      if (!items.length) { wrap.style.display = 'none'; return; }

      document.getElementById('redes-menu').innerHTML = items.map(item => `
        <a class="redes-item" href="${item.href}" target="_blank">
          <span class="redes-label">${item.label}</span>
          <span class="redes-icon">${item.icon}</span>
        </a>`).join('');
    }

    async function cargarMenu() {
      try {
        const clientes = await fetchJSON(`${SUPABASE_URL}/rest/v1/clientes?slug=eq.${slug}&select=*`);
        if (!clientes.length) { document.getElementById('menu-content').innerHTML = '<div class="error-msg">Local no encontrado.</div>'; return; }
        const c = clientes[0];

        // Estilos
        const root = document.documentElement;
        if (c.color_fondo)   root.style.setProperty('--cream', c.color_fondo);
        if (c.color_texto)   root.style.setProperty('--dark', c.color_texto);
        if (c.color_acento)  { root.style.setProperty('--gold', c.color_acento); root.style.setProperty('--brown', c.color_acento); }
        if (c.color_primario) document.getElementById('footer-bar').style.background = c.color_primario;

        const fuente = FUENTES[c.tipografia] || FUENTES.clasica;
        if (fuente.google) document.getElementById('google-font').href = `https://fonts.googleapis.com/css2?family=${fuente.google}&display=swap`;
        root.style.setProperty('--font-titulo', fuente.titulo);
        root.style.setProperty('--font-body', fuente.body);

        // FAB
        buildRedes(c);

        // Contenido
        const categorias = await fetchJSON(`${SUPABASE_URL}/rest/v1/categorias?cliente_id=eq.${c.id}&select=*&order=orden.asc`);
        let platos = [];
        if (categorias.length) {
          const catIds = categorias.map(x => x.id).join(',');
          platos = await fetchJSON(`${SUPABASE_URL}/rest/v1/platos?categoria_id=in.(${catIds})&activo=eq.true&order=orden.asc`);
        }

        let html = '';
        if (c.portada_url) html += `<img class="portada" src="${c.portada_url}" alt="Portada">`;
        html += `<div class="hero">`;
        if (c.logo_url) html += `<img class="hero-logo ${c.portada_url ? '' : 'no-portada'}" src="${c.logo_url}" alt="Logo">`;
        html += `<div class="hero-badge">Menú digital</div><h1>${c.nombre}</h1><p class="hero-sub">${c.direccion || 'Buenos Aires'}</p></div>`;
        html += `<nav class="cat-nav">` + categorias.map((x, i) =>
          `<button class="cat-btn ${i===0?'active':''}" onclick="scrollToSec('cat-${x.id}', this)">${x.nombre}</button>`
        ).join('') + `</nav>`;

        categorias.forEach((cat, i) => {
          const items = platos.filter(p => p.categoria_id === cat.id);
          if (!items.length) return;
          if (i > 0) html += '<div class="divider"><span>✦</span></div>';
          html += `<div class="section" id="cat-${cat.id}"><div class="section-title">${cat.nombre}</div>${cat.descripcion ? `<div class="section-desc">${cat.descripcion}</div>` : ''}`;
          items.forEach(p => {
            html += `<div class="item"><div class="item-info"><div class="item-name">${p.nombre}</div>${p.descripcion ? `<div class="item-detail">${p.descripcion}</div>` : ''}${p.tag ? `<span class="item-tag">${p.tag}</span>` : ''}</div><div class="item-price">$${Number(p.precio).toLocaleString('es-AR')}</div></div>`;
          });
          html += '</div>';
        });

        if (!categorias.length) html += '<div class="error-msg">No hay platos cargados aún.</div>';
        document.getElementById('menu-content').innerHTML = html;

      } catch(e) {
        document.getElementById('menu-content').innerHTML = '<div class="error-msg">Error al cargar el menú.</div>';
      }
    }

    function scrollToSec(id, btn) {
      document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    cargarMenu();
  </script>
</body>
</html>
